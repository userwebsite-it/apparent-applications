<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apparent Applications</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #ffffff;
      color: #172233;
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      padding: 34px 7%;
      position: relative;
    }

    .brand {
      text-align: center;
      font-size: 1.25rem;
      letter-spacing: 0.08em;
      color: #5aaee8;
      margin-bottom: 42px;
    }

    .top-area {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 45px;
    }

    .explore {
      color: #5aaee8;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
    }

    .explore-box {
      margin-top: 10px;
      border: 2px solid #5aaee8;
      width: 170px;
    }

    .explore-box div {
      padding: 10px;
      border-bottom: 2px solid #5aaee8;
      font-size: 0.95rem;
      color: #172233;
    }

    .explore-box div:last-child {
      border-bottom: none;
    }

    .opportunities {
      border: 2px solid #5aaee8;
      color: #172233;
      width: 190px;
      text-align: center;
      font-size: 1rem;
    }

    .opportunities div {
      padding: 12px;
      border-bottom: 2px solid #5aaee8;
    }

    .opportunities div:last-child {
      border-bottom: none;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 360px;
      align-items: center;
      gap: 50px;
      margin-top: 15px;
    }

    .quote-area {
      text-align: center;
    }

    .quote {
      font-size: clamp(2.2rem, 4.5vw, 4.4rem);
      line-height: 1.05;
      font-weight: 500;
      color: #172233;
      max-width: 750px;
      margin: 0 auto 30px;
    }

    .subline {
      font-size: clamp(1.4rem, 3vw, 2.6rem);
      color: #5aaee8;
      display: inline-block;
      position: relative;
    }

    .we-wrap {
      display: inline-block;
      position: relative;
      margin-right: 10px;
    }

    .we {
      color: #172233;
      position: relative;
    }

    .we::after {
      content: "";
      position: absolute;
      left: -6px;
      right: -6px;
      top: 54%;
      height: 3px;
      background: #172233;
      transform: rotate(-8deg);
      border-radius: 999px;
    }

    .you {
      position: absolute;
      left: 2px;
      top: 78%;
      font-size: 0.45em;
      color: #172233;
      font-family: "Brush Script MT", cursive;
      transform: rotate(-8deg);
    }

    .art {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .art img {
      width: 100%;
      max-width: 340px;
      border-radius: 22px;
      box-shadow: 0 18px 50px rgba(90, 174, 232, 0.25);
    }

    @media (max-width: 850px) {
      .top-area {
        flex-direction: column;
        align-items: center;
        gap: 22px;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .quote {
        font-size: 3rem;
      }

      .art img {
        max-width: 310px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="brand">Apparent Applications</div>

    <section class="top-area">
      <div>
        <div class="explore">EXPLORE</div>
        <div class="explore-box">
          <div>Will it allow?</div>
          <div>Why</div>
          <div>How to join?</div>
        </div>
      </div>

      <div class="opportunities">
        <div>Opportunities</div>
        <div>Student Projects</div>
      </div>
    </section>

    <section class="hero">
      <div class="quote-area">
        <h1 class="quote">To become a star, you must burn</h1>

        <div class="subline">
          <span class="we-wrap">
            <span class="we">We</span>
            <span class="you">you</span>
          </span>
          do it all
        </div>
      </div>

      <div class="art">
        <img src="aim-stars.png" alt="Aim for the stars artwork" />
      </div>
    </section>
  </main>
</body>
</html>
