<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apparent Applications</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(135deg, #f7fbff 0%, #d9ecff 55%, #ffffff 100%);
      color: #1f2d3d;
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 32px 7%;
    }

    .brand {
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      color: #4f9fd8;
      font-weight: 500;
    }

    .hero {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 0.9fr;
      align-items: center;
      gap: 60px;
    }

    .text-area {
      max-width: 650px;
    }

    .quote {
      font-size: clamp(3rem, 7vw, 6.8rem);
      line-height: 0.95;
      font-weight: 500;
      color: #24384f;
      margin-bottom: 36px;
    }

    .subline {
      font-size: clamp(1.8rem, 4vw, 3.4rem);
      color: #4f9fd8;
      position: relative;
      display: inline-block;
      line-height: 1.1;
    }

    .we-wrap {
      display: inline-block;
      position: relative;
      margin-right: 10px;
    }

    .we {
      position: relative;
      color: #8aa0b5;
    }

    .we::after {
      content: "";
      position: absolute;
      left: -4px;
      right: -4px;
      top: 52%;
      height: 3px;
      background: #24384f;
      transform: rotate(-8deg);
      border-radius: 999px;
    }

    .you {
      position: absolute;
      left: 4px;
      top: 78%;
      font-size: 0.45em;
      color: #24384f;
      font-family: "Brush Script MT", cursive;
      transform: rotate(-5deg);
    }

    .art-card {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .art-card img {
      width: min(430px, 100%);
      border-radius: 28px;
      box-shadow: 0 25px 70px rgba(79, 159, 216, 0.25);
    }

    @media (max-width: 850px) {
      .hero {
        grid-template-columns: 1fr;
        text-align: center;
        gap: 35px;
        padding-top: 50px;
      }

      .text-area {
        margin: 0 auto;
      }

      .art-card img {
        width: min(340px, 90%);
      }

      .brand {
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="brand">Apparent Applications</header>

    <section class="hero">
      <div class="text-area">
        <h1 class="quote">To become a star, you must burn</h1>

        <div class="subline">
          <span class="we-wrap">
            <span class="we">We</span>
            <span class="you">you</span>
          </span>
          do it all
        </div>
      </div>

      <div class="art-card">
        <img src="aim-stars.png" alt="Aim for the stars artwork" />
      </div>
    </section>
  </main>
</body>
</html>
