<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apparent Applications</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #ffffff;
      color: #111827;
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      padding: 34px 7%;
      position: relative;
    }

    .brand {
      text-align: center;
      font-size: 1.35rem;
      letter-spacing: 0.08em;
      color: #111827;
      margin-bottom: 14px;
    }

    .subline {
      text-align: center;
      font-size: 2.1rem;
      color: #5aaee8;
      margin-bottom: 55px;
    }

    .we-wrap {
      display: inline-block;
      position: relative;
      margin-right: 10px;
    }

    .we {
      color: #111827;
      position: relative;
    }

    .we::after {
      content: "";
      position: absolute;
      left: -6px;
      right: -6px;
      top: 54%;
      height: 3px;
      background: #111827;
      transform: rotate(-8deg);
      border-radius: 999px;
    }

    .you {
      position: absolute;
      left: 2px;
      top: 78%;
      font-size: 0.45em;
      color: #111827;
      font-family: "Brush Script MT", cursive;
      transform: rotate(-8deg);
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .explore-menu {
      position: relative;
      color: #5aaee8;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      width: 190px;
    }

    .dropdown {
      display: none;
      margin-top: 12px;
      border: 2px solid #5aaee8;
      background: white;
      letter-spacing: 0;
      color: #111827;
      width: 190px;
      position: absolute;
      z-index: 10;
    }

    .dropdown div {
      padding: 12px;
      border-bottom: 2px solid #5aaee8;
      font-size: 0.95rem;
    }

    .dropdown div:last-child {
      border-bottom: none;
    }

    .explore-menu:hover .dropdown {
      display: block;
    }

    .student-projects-wrap {
      position: relative;
      margin-right: 20px;
      margin-top: 8px;
    }

    .opportunity-label {
      color: #5aaee8;
      font-size: 1rem;
      text-align: center;
      margin-bottom: 12px;
      position: relative;
    }

    .opportunity-label::after {
      content: "↓";
      display: block;
      color: #5aaee8;
      font-size: 1.8rem;
      line-height: 1;
      margin-top: 2px;
    }

    .student-projects {
      border: 2px solid #5aaee8;
      color: #111827;
      padding: 14px 24px;
      font-size: 1.05rem;
      background: white;
    }

    .center-quote {
      position: absolute;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 80%;
      max-width: 900px;
    }

    .quote {
      font-size: clamp(2.8rem, 5vw, 5rem);
      line-height: 1.05;
      font-weight: 500;
      color: #111827;
    }

    .art {
      position: absolute;
      right: 7%;
      top: 58%;
      transform: translateY(-50%);
      width: 300px;
    }

    .art img {
      width: 100%;
      border-radius: 22px;
      box-shadow: 0 18px 50px rgba(90, 174, 232, 0.25);
    }

    @media (max-width: 900px) {
      .center-quote {
        position: static;
        transform: none;
        width: 100%;
        margin-top: 90px;
      }

      .art {
        position: static;
        transform: none;
        margin: 40px auto 0;
      }

      .top-row {
        gap: 30px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="brand">Apparent Applications</div>

    <div class="subline">
      <span class="we-wrap">
        <span class="we">We</span>
        <span class="you">you</span>
      </span>
      do it all
    </div>

    <section class="top-row">
      <div class="explore-menu">
        EXPLORE
        <div class="dropdown">
          <div>Will it allow?</div>
          <div>Why</div>
          <div>How to join?</div>
        </div>
      </div>

      <div class="student-projects-wrap">
        <div class="opportunity-label">Opportunities</div>
        <div class="student-projects">Student Projects</div>
      </div>
    </section>

    <section class="center-quote">
      <h1 class="quote">To become a star, you must burn</h1>
    </section>

    <div class="art">
      <img src="aim-stars.png" alt="Aim for the stars artwork" />
    </div>
  </main>
</body>
</html>
