<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apparent Applications</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #ffffff;
      color: #111827;
    }

    .page {
      min-height: 100vh;
      padding: 30px 7%;
    }

    /* TITLE */
    .brand {
      text-align: center;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      color: #111827;
      margin-bottom: 10px;
    }

    /* WE DO IT ALL */
    .subline {
      text-align: center;
      font-size: 2rem;
      color: #5aaee8;
      margin-bottom: 60px;
    }

    .we-wrap {
      display: inline-block;
      position: relative;
      margin-right: 10px;
    }

    .we {
      color: #111827;
      position: relative;
    }

    .we::after {
      content: "";
      position: absolute;
      left: -6px;
      right: -6px;
      top: 54%;
      height: 3px;
      background: #111827;
      transform: rotate(-8deg);
    }

    .you {
      position: absolute;
      left: 2px;
      top: 78%;
      font-size: 0.45em;
      color: #111827;
      font-family: "Brush Script MT", cursive;
      transform: rotate(-8deg);
    }

    /* TOP ROW */
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 80px;
    }

    /* EXPLORE */
    .explore-menu {
      position: relative;
      color: #5aaee8;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      cursor: pointer;
    }

    .dropdown {
      display: none;
      margin-top: 12px;
      border: 2px solid #5aaee8;
      background: white;
      width: 190px;
      position: absolute;
      z-index: 10;
    }

    .dropdown div {
      padding: 12px;
      border-bottom: 2px solid #5aaee8;
      font-size: 0.95rem;
      color: #111827;
    }

    .dropdown div:last-child {
      border-bottom: none;
    }

    .explore-menu:hover .dropdown {
      display: block;
    }

    /* OPPORTUNITIES */
    .student-projects-wrap {
      text-align: center;
    }

    .opportunity-label {
      color: #5aaee8;
      font-size: 1rem;
      margin-bottom: 8px;
    }

    .opportunity-label::after {
      content: "↓";
      display: block;
      font-size: 1.8rem;
      color: #5aaee8;
    }

    .student-projects {
      border: 2px solid #5aaee8;
      padding: 14px 24px;
      font-size: 1.05rem;
      background: white;
      color: #111827;
    }

    /* MAIN CENTER */
    .main-content {
      display: grid;
      grid-template-columns: 1fr 260px;
      align-items: center;
      gap: 50px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .center-quote {
      text-align: center;
    }

    .quote {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3.2rem, 5vw, 5.5rem);
      line-height: 1.05;
      font-weight: 500;
      color: #111827;
      text-align: center;
    }

    /* IMAGE */
    .art img {
      width: 240px;
      border-radius: 20px;
      box-shadow: 0 18px 50px rgba(90, 174, 232, 0.25);
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .top-row {
        flex-direction: column;
        align-items: center;
        gap: 30px;
      }

      .main-content {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .art img {
        width: 240px;
      }
    }

  </style>
</head>

<body>

  <main class="page">

    <div class="brand">Apparent Applications</div>

    <div class="subline">
      <span class="we-wrap">
        <span class="we">We</span>
        <span class="you">you</span>
      </span>
      do it all
    </div>

    <section class="top-row">
      <div class="explore-menu">
        EXPLORE
        <div class="dropdown">
          <div>Will it allow?</div>
          <div>Why</div>
          <div>How to join?</div>
        </div>
      </div>

      <div class="student-projects-wrap">
        <div class="opportunity-label">Opportunities</div>
        <div class="student-projects">Student Projects</div>
      </div>
    </section>

    <section class="main-content">
      <div class="center-quote">
        <h1 class="quote">
          To become a star,<br>you must burn
        </h1>
      </div>

      <div class="art">
        <img src="aim-stars.png" alt="Aim for the stars artwork">
      </div>
    </section>

  </main>

</body>
</html>
