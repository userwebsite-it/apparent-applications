<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apparent Applications</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #ffffff;
      color: #111827;
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      padding: 30px 7%;
      position: relative;
    }

    /* TITLE */
    .brand {
      text-align: center;
      font-size: 1.8rem; /* bigger */
      letter-spacing: 0.08em;
      color: #111827;
      margin-bottom: 10px;
    }

    /* ROW UNDER TITLE */
    .middle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 90px;
    }

    /* WE DO IT ALL */
    .subline {
      font-size: 2.6rem; /* bigger */
      color: #5aaee8;
      text-align: center;
    }

    .we-wrap {
      display: inline-block;
      position: relative;
      margin-right: 10px;
    }

    .we {
      color: #111827;
      position: relative;
    }

    .we::after {
      content: "";
      position: absolute;
      left: -6px;
      right: -6px;
      top: 54%;
      height: 3px;
      background: #111827;
      transform: rotate(-8deg);
    }

    .you {
      position: absolute;
      left: 2px;
      top: 78%;
      font-size: 0.45em;
      color: #111827;
      font-family: "Brush Script MT", cursive;
      transform: rotate(-8deg);
    }

    /* EXPLORE */
    .explore-menu {
      position: relative;
      color: #5aaee8;
      font-size: 1.4rem; /* bigger */
      letter-spacing: 0.12em;
      cursor: pointer;
    }

    .dropdown {
      display: none;
      margin-top: 12px;
      border: 2px solid #5aaee8;
      background: white;
      width: 200px;
      position: absolute;
      z-index: 10;
    }

    .dropdown div {
      padding: 14px;
      border-bottom: 2px solid #5aaee8;
      font-size: 1.05rem;
      color: #111827;
    }

    .dropdown div:last-child {
      border-bottom: none;
    }

    .explore-menu:hover .dropdown {
      display: block;
    }

    /* OPPORTUNITIES */
    .student-projects-wrap {
      text-align: center;
    }

    .opportunity-label {
      color: #5aaee8;
      font-size: 1.3rem; /* bigger */
      margin-bottom: 8px;
    }

    .opportunity-label::after {
      content: "↓";
      display: block;
      font-size: 2rem;
      color: #5aaee8;
    }

    .student-projects {
      border: 2px solid #5aaee8;
      padding: 16px 28px;
      font-size: 1.2rem; /* bigger */
      background: white;
      color: #111827;
    }

    /* QUOTE */
    .quote-box {
      position: absolute;
      left: 50%;
      top: 60%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 70%;
      max-width: 850px;
    }

    .quote {
      font-size: clamp(2.4rem, 4vw, 4rem); /* smaller */
      line-height: 1.1;
      font-weight: 500;
      color: #111827;
    }

    /* IMAGE */
    .art {
      position: absolute;
      right: 7%;
      top: 60%;
      transform: translateY(-50%);
    }

    .art img {
      width: 190px; /* slightly smaller */
      border-radius: 20px;
      box-shadow: 0 18px 50px rgba(90, 174, 232, 0.25);
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .middle-row {
        flex-direction: column;
        gap: 25px;
      }

      .quote-box {
        position: static;
        transform: none;
        margin-top: 80px;
        width: 100%;
      }

      .art {
        position: static;
        transform: none;
        text-align: center;
        margin-top: 40px;
      }
    }

  </style>
</head>

<body>

  <main class="page">

    <div class="brand">Apparent Applications</div>

    <section class="middle-row">

      <div class="explore-menu">
        EXPLORE
        <div class="dropdown">
          <div>Will it allow?</div>
          <div>Why</div>
          <div>How to join?</div>
        </div>
      </div>

      <div class="subline">
        <span class="we-wrap">
          <span class="we">We</span>
          <span class="you">you</span>
        </span>
        do it all
      </div>

      <div class="student-projects-wrap">
        <div class="opportunity-label">Opportunities</div>
        <div class="student-projects">Student Projects</div>
      </div>

    </section>

    <section class="quote-box">
      <h1 class="quote">
        To become a star,<br>you must burn
      </h1>
    </section>

    <div class="art">
      <img src="aim-stars.png" alt="Aim for the stars artwork">
    </div>

  </main>

</body>
</html>
